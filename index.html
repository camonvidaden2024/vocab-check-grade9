<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCAB TIME! - LIVE SYSTEM</title>
<style>
body{
    font-family:"Times New Roman",serif;
    background:linear-gradient(135deg,#F99895,#ABD5A4);
    min-height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
}
.screen{
    width:85%;
    max-width:750px;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    text-align:center;
    margin: 20px;
}
.hidden{display:none;}
h1{
    font-size:52px;
    color:white;
    text-shadow:3px 3px 5px rgba(0,0,0,.25);
    margin-top: 0;
}
input, select{
    width:80%;
    padding:14px;
    font-size:22px;
    border-radius:10px;
    border:2px solid #ccc;
    font-family:"Times New Roman",serif;
    margin-bottom: 15px;
}
button{
    margin-top:20px;
    padding:12px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#F99895;
    color:white;
    font-family:"Times New Roman",serif;
    transition: 0.2s;
}
button:hover { background: #e08582; }
.btn-teacher { background: #4A90E2; }
.btn-teacher:hover { background: #357ABD; }
#timer{
    font-size:42px;
    color:#BA1B18;
    font-weight:bold;
}
#progressContainer{
    width:100%;
    height:22px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:15px 0;
}
#progressBar{
    width:0%;
    height:100%;
    background:#9ABF17;
    transition:.4s;
}
#questionCounter{font-size:24px;}
#questionBox{
    font-size:38px;
    font-weight:bold;
    margin:25px 0;
}
.correct{background:#9ABF17 !important;color:white;}
.wrong{background:#BA1B18 !important;color:white;}
#feedback{
    font-size:90px;
    height:100px;
    font-weight:bold;
}
.correctMark{color:#9ABF17;}
.wrongMark{color:#BA1B18;}
#finalScore{
    font-size:48px;
    color:#9ABF17;
    font-weight:bold;
}
/* Hệ thống bảng Giáo viên */
table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 18px; }
th { background-color: #4A90E2; color: white; }
tr:nth-child(even){background-color: #f9f9f9;}
.vocab-list { max-height: 250px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; background: #fff; border-radius: 8px; text-align: left; margin-bottom: 20px; }
.vocab-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 18px; }
.firework{
    position:fixed;
    font-size:40px;
    animation:explode 2s linear forwards;
}
@keyframes explode{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-250px);opacity:0;}
}
</style>
</head>
<body>

<div id="roleScreen" class="screen">
    <h1 style="color:#BA1B18; text-shadow:none;">VOCABULARY SYSTEM</h1>
    <p
